<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mauri-Drones — Gestion flotte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Palette Mauri-Drones ── */

:root {
  --bg:        #0b1018;
  --surface:   #14171c;
  --card:      #1b1f27;
  --border:    #2b2f38;
  --border2:   #3e4450;
  --text:      #c8cdd6;
  --muted:     #5e6776;
  --blue:      #4d8ecb;
  --blue-dark: #3a78b8;
  --blue-light:#6ba3d9;
  --green:     #22c55e;
  --orange:    #f97316;
  --red:       #ef4444;
  --white:     #ffffff;
}

,::before,*::after { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: 'Space Grotesk', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px; height: 36px;
  position: relative; flex-shrink: 0;
}
.logo-icon svg { width: 100%; height: 100%; }

.brand { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.5px; color: var(--white); }
.brand span { color: var(--blue); }
.brand-sub { font-size: .75rem; color: var(--muted); margin-left: auto; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; }

/* ── Layout ── */
.container { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

/* ── Stats ── */
.stats {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
}
.stat-val { font-size: 1.75rem; font-weight: 700; color: var(--blue); line-height: 1; margin-bottom: 4px; }
.stat-val.green { color: var(--green); }
.stat-val.orange { color: var(--orange); }
.stat-val.red { color: var(--red); }
.stat-val.purple { color: #a78bfa; }
.stat-lbl { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-weight: 600; }

/* ── Alert ── */
.alert {
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 22px;
  font-size: .875rem;
  border-left: 3px solid;
  display: flex; align-items: center; gap: 10px;
}
.alert.success { background: #001a08; border-color: var(--green); color: #86efac; }
.alert.error   { background: #1a0800; border-color: var(--red);   color: #fca5a5; }
.alert.warning { background: #1a0800; border-color: var(--orange); color: #fdba74; }
.alert-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.success .alert-dot { background: var(--green); }
.error   .alert-dot { background: var(--red); }
.warning .alert-dot { background: var(--orange); }

/* ── Grid 2 colonnes ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }

/* ── Card ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.card-header h2 { font-size: .9rem; font-weight: 600; color: var(--white); }
.card-header .badge-count {
  margin-left: auto;
  background: var(--blue);
  color: var(--white);
  font-size: .7rem; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
}
.card-icon { width: 18px; height: 18px; color: var(--blue); }
.card-body { padding: 20px; }

/* ── Formulaire ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 10px; }
.form-group.full { grid-column: 1/-1; }
label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }

input, select {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 9px 12px;
  border-radius: 7px;
  font-family: inherit;
  font-size: .875rem;
  transition: border-color .2s, box-shadow .2s;
  width: 100%;
}
input:focus, select:focus {
  outline: none;
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(77,142,203,.15);
}
input::placeholder { color: var(--border2); }
select option { background: var(--surface); }

.form-actions { margin-top: 16px; display: flex; gap: 10px; }

/* ── Boutons ── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border: none; border-radius: 7px;
  font-family: inherit; font-size: .82rem; font-weight: 600;
  cursor: pointer; text-decoration: none;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}
.btn:hover { opacity: .88; transform: translateY(-1px); }
.btn-primary   { background: var(--blue);  color: #fff; }
.btn-ghost     { background: var(--border); color: var(--text); }
.btn-edit      { background: rgba(77,142,203,.15); color: var(--blue-light); font-size: .75rem; padding: 5px 12px; }
.btn-delete    { background: rgba(239,68,68,.12); color: #f87171; font-size: .75rem; padding: 5px 12px; }

/* ── Searchbar ── */
.searchbar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.searchbar input, .searchbar select { flex: 1; min-width: 160px; }
.search-icon { color: var(--muted); flex-shrink: 0; }

/* ── Table ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .83rem; }
thead tr { background: var(--surface); }
th {
  padding: 10px 14px; text-align: left;
  color: var(--muted); font-size: .7rem;
  text-transform: uppercase; letter-spacing: .07em; font-weight: 600;
  white-space: nowrap;
}
tbody tr { border-top: 1px solid var(--border); transition: background .12s; }
tbody tr:hover { background: rgba(77,142,203,.05); }
td { padding: 11px 14px; vertical-align: middle; }
.drone-name { font-weight: 600; color: var(--white); }
.drone-sub { font-size: .75rem; color: var(--muted); margin-top: 2px; }

/* ── Status badge ── */
.status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px;
  font-size: .73rem; font-weight: 600;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.s-actif  { background: rgba(34,197,94,.1);  color: #4ade80; }
.s-actif  .status-dot { background: var(--green); }
.s-maint  { background: rgba(249,115,22,.1); color: #fb923c; }
.s-maint  .status-dot { background: var(--orange); }
.s-hors   { background: rgba(239,68,68,.1);  color: #f87171; }
.s-hors   .status-dot { background: var(--red); }

/* ── Empty ── */
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-icon { font-size: 2.5rem; margin-bottom: 10px; opacity: .4; }

@media (max-width: 900px) {
  .grid-2 { grid-template-columns: 1fr; }
  .stats  { grid-template-columns: repeat(3,1fr); }
  table { min-width: 700px; }
}
@media (max-width: 600px) {
  .stats { grid-template-columns: 1fr 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  header { padding: 0 16px; }
  .container { padding: 16px; }
}

</style>
</head>
